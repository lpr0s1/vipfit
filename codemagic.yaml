workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 3. Générer l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          else
            echo "Pas d'icône trouvée, étape ignorée."
          fi

      - name: 4. Compiler la version iOS (Forçage Xcode strict)
        script: |
          echo "Lancement du build avec contournement des signatures Xcode..."
          
          # On nettoie le build pour repartir sur du propre
          flutter clean
          flutter pub get
          
          # La vraie astuce : On passe les arguments de build DIRECTEMENT à xcodebuild via --build-name/number
          # et en forçant l'identité de signature à vide au niveau de Flutter.
          flutter build ios --release --no-codesign \
            --extra-front-end-options="--no-implicit-dynamic-reexport" \
            --split-debug-info=build/app/outputs/symbols
            
      - name: 5. Forcer la création de l'IPA sans signature (Méthode Manuelle)
        script: |
          echo "Empaquetage manuel du Payload pour Sideloadly..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          
          # Création du dossier Payload requis par iOS pour les fichiers .ipa
          mkdir -p Payload
          cp -r Runner.app Payload/
          
          # On crée l'archive zip finale et on la renomme en .ipa
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
