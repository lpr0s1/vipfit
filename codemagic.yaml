workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 2.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi

      - name: 3. Compiler pour simulateur avec architecture iPhone (Zéro restriction)
        script: |
          echo "Compilation de l'application..."
          # On compile pour simulateur mais en forçant l'architecture ARM64 des vrais iPhone
          flutter build ios --simulator --release --extra-gen-snapshot-options=--sim_use_hard_fp --build-name=1.0.0 --build-number=1

      - name: 4. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          
          # Sur un build simulateur, le dossier s'appelle Release-iphonesimulator
          cd build/ios/iphonesimulator
          
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
