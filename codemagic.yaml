workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi
      - name: 1.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi
      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get
      - name: 3. Compiler la version iOS (Contournement total Signature & Team ID)
        script: |
          echo "Forçage des paramètres de non-signature dans la configuration Flutter..."
          
          # On désactive explicitement la signature dans le fichier d'override de Flutter
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          
          echo "Compilation sans signature..."
          flutter build ios --release --no-codesign --build-name=1.0.0 --build-number=1
      - name: 4. Créer le fichier .ipa
        script: |
          echo "Empaquetage du Payload pour Sideloadly..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
