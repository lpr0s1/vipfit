workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 2.5 Générer l'icône de l'application (si le fichier existe)
        script: |
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          else
            echo "Attention : assets/app_icon.png introuvable, création d'une icône par défaut."
          fi

      - name: 3. Préparer le projet et compiler sans signature
        script: |
          echo "Désactivation stricte de la signature via xcconfig..."
          mkdir -p ios/Flutter
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          
          echo "Lancement de la compilation Flutter..."
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: 4. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
