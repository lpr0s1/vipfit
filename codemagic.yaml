workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 2.5 Générer l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          else
            echo "Pas d'icône trouvée, étape ignorée."
          fi

      - name: 3. Forcer Xcode à ignorer la Development Team et la Signature
        script: |
          echo "Modification chirurgicale du fichier projet Xcode..."
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          
          if [ -f "$PBXPROJ" ]; then
            # 1. On supprime les lignes CODE_SIGN_IDENTITY existantes pour éviter les conflits
            sed -i '' '/CODE_SIGN_IDENTITY/d' "$PBXPROJ"
            
            # 2. On désactive le "Automatic Signing" qui force la recherche d'une Team
            sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBXPROJ"
            
            # 3. On injecte l'absence de Team et d'identité de signature dans toutes les configurations de build
            sed -i '' 's/DevelopmentTeam = .*/DevelopmentTeam = "";/g' "$PBXPROJ"
            
            # 4. On s'assure que le dictionnaire TargetAttributes n'exige pas de Team
            sed -i '' '/DevelopmentTeam = /d' "$PBXPROJ"
            
            echo "Injection des flags de contournement globaux dans Release.xcconfig..."
            mkdir -p ios/Flutter
            echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
            echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
            echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
            echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig
            echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          else
            echo "Erreur : Fichier Xcode introuvable !"
            exit 1
          fi

      - name: 4. Compiler la version iOS (Sans signature)
        script: |
          echo "Compilation en cours..."
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: 5. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
