workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 1.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi

      - name: 3. Compiler la version iOS (Bypass total via Xcodebuild)
        script: |
          echo "Préparation du projet par Flutter..."
          # On demande à Flutter de préparer les fichiers et Cocoapods sans lancer la compilation
          flutter build ios --config-only

          echo "Compilation native forcée avec xcodebuild..."
          cd ios
          # On utilise directement le compilateur d'Apple en lui forçant les paramètres
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT="$(PWD)/../build/ios" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 4. Créer le fichier .ipa
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          # Attention : le chemin de sortie natif est Release-iphoneos
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
