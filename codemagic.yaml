workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Créer la structure de base sans fioritures
        script: |
          echo "Génération des fichiers natifs indispensables..."
          flutter create . --project-name vipfit --org com.apple.test --platforms ios
          sleep 2

      - name: 2. Installer les packages
        script: |
          flutter pub get

      - name: 3. Forcer le moteur Flutter à compiler le code Dart (Sans Xcode)
        script: |
          echo "Compilation du code Dart en binaire natif ARM64..."
          # Cette commande magique compile le code d'une manière que Xcode ne peut pas bloquer
          flutter build aot --release --target-platform ios --ios-arch arm64

      - name: 4. Neutraliser Xcode à la racine (Remplacement des variables globales)
        script: |
          echo "Éradication totale du besoin de signature dans l'environnement Mac..."
          
          # On injecte les flags directement dans TOUS les fichiers de configuration possibles
          for file in ios/Flutter/*.xcconfig; do
            echo "" >> "$file"
            echo "CODE_SIGNING_ALLOWED = NO" >> "$file"
            echo "CODE_SIGNING_REQUIRED = NO" >> "$file"
            echo "CODE_SIGN_IDENTITY = " >> "$file"
            echo "DEVELOPMENT_TEAM = " >> "$file"
            echo "PROVISIONING_PROFILE_SPECIFIER = " >> "$file"
          done

          # On désactive la signature automatique dans le pbxproj de manière radicale
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = .*/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/DevelopmentTeam = .*/DevelopmentTeam = "";/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"

      - name: 5. Lancer Xcode en mode "Archive Seule" (Ligne de commande pure)
        script: |
          echo "Lancement de xcodebuild en mode force brute..."
          cd ios
          
          # On utilise xcodebuild DIRECTEMENT sans passer par Flutter, en lui interdisant de signer
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     -allowProvisioningUpdates NO \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     DEVELOPMENT_TEAM="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     GENERATED_PKGINFO_FILE="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     clean build

      - name: 6. Fabriquer l'IPA pour Sideloadly
        script: |
          echo "Création du package final pour ton iPhone..."
          mkdir -p build/ios/ipa
          
          # On récupère le fichier brut compilé directement par Xcode
          mkdir -p build/ios/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/Payload/ 2>/dev/null || cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          
          cd build/ios
          zip -r -q ipa/vipfit.ipa Payload
          echo "L'IPA est enfin prêt pour Sideloadly !"
          
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
