workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 3. Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            echo "Icône trouvée, génération des ressources iOS..."
            dart run flutter_launcher_icons
          else
            echo "Attention : assets/app_icon.png manquant, l'icône par défaut sera utilisée."
          fi

      - name: 4. Compiler la version iOS (Astuce Simulateur ARM64)
        script: |
          echo "Compilation via l'astuce simulateur pour contourner Xcode..."
          # On compile pour simulateur (zéro vérification de team) mais en forçant l'architecture ARM64 des vrais iPhone
          flutter build ios --simulator --config-only
          
          echo "Lancement du build Xcode brut..."
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphonesimulator \
                     ARCHS="arm64" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     ONLY_ACTIVE_ARCH=NO \
                     clean build

      - name: 5. Créer le fichier .ipa
        script: |
          echo "Empaquetage du Payload pour Sideloadly..."
          cd $CM_BUILD_DIR
          mkdir -p build/ios/ipa
          
          # Le build atterrit dans le dossier Release-iphonesimulator
          cd build/ios/iphonesimulator
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
