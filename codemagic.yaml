workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 3. Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            echo "Icône trouvée, génération des ressources iOS..."
            dart run flutter_launcher_icons
          else
            echo "Attention : assets/app_icon.png manquant."
          fi

      - name: 4. Compiler en mode Simulateur sans contrainte
        script: |
          echo "Compilation de l'application (Zéro vérification Apple)..."
          flutter build ios --simulator --debug

      - name: 5. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          cd $CM_BUILD_DIR
          mkdir -p build/ios/ipa
          
          # En mode debug, le fichier est généré dans 'Debug-iphonesimulator'
          cd build/ios/Debug-iphonesimulator
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
