workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS (Sécurisé)
        script: |
          echo "Sauvegarde de ton code..."
          mkdir -p temp_src
          cp -r lib pubspec.yaml temp_src/ 2>/dev/null || cp pubspec.yaml temp_src/

          echo "Génération complète du projet..."
          flutter create . --project-name vipfit --org com.hx --platforms ios

          echo "Restauration de ton code personnalisé..."
          cp -r temp_src/pubspec.yaml ./
          if [ -d "temp_src/lib" ]; then
            cp -r temp_src/lib/ ./lib/
          fi

      - name: 2. Télécharger les dépendances et générer l'icône
        script: |
          flutter pub get
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          fi

      - name: 3. Leurre de signature (Faker la Development Team)
        script: |
          echo "Injection d'une fausse Team ID dans la configuration de build..."
          echo "DEVELOPMENT_TEAM = 1A2B3C4D5E" >> ios/Flutter/Release.xcconfig

      - name: 4. Compiler l'application normalement (Sans signature)
        script: |
          echo "Compilation officielle via Flutter..."
          flutter build ios --release --no-codesign

      - name: 5. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Création du package IPA..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
