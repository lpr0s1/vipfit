workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 3. Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            echo "Icône trouvée, génération des ressources iOS..."
            dart run flutter_launcher_icons
          else
            echo "Attention : assets/app_icon.png manquant, l'icône par défaut sera utilisée."
          fi

      - name: 3.5 Forcer Xcode à ignorer la Development Team
        script: |
          echo "Désactivation des verrous de signature Apple..."
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig

      - name: 4. Compiler la version iOS (Sans signature)
        script: |
          echo "Compilation en cours..."
          flutter build ios --release --no-codesign

      - name: 5. Créer le fichier .ipa
        script: |
          echo "Empaquetage du Payload pour Sideloadly..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
