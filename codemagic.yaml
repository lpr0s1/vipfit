workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 2.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi

      - name: 3. Préparer les fichiers Flutter pour Xcode
        script: |
          echo "Génération des fichiers de configuration Flutter..."
          flutter build ios --config-only --release

      - name: 3.5 Compiler avec xcodebuild (Force l'impasse sur la Team)
        script: |
          echo "Compilation brute via Xcode sans aucune signature..."
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build

      - name: 4. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          
          # On cible le dossier de sortie généré par xcodebuild
          cd ios/build/Release-iphoneos
          
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          
          # On déplace l'IPA là où Codemagic cherche les artefacts
          mkdir -p ../../../build/ios/ipa
          mv vipfit.ipa ../../../build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
