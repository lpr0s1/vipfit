workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi
      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get
      - name: 3. Compiler en mode Debug (Contournement ultime de la Team Apple)
        script: |
          echo "Compilation en mode de débogage sans signature (Autorisé par Apple sans compte)..."
          flutter build ios --debug --no-codesign
      - name: 4. Convertir et créer le fichier .ipa pour Sideloadly
        script: |
          echo "Préparation du Payload..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          
          # Création du dossier requis par Sideloadly
          mkdir -p Payload
          cp -r Runner.app Payload/
          
          # Petite astuce : on nettoie les fichiers de liaisons spécifiques au débug local pour éviter les rejets
          rm -rf Payload/Runner.app/Frameworks/lib_flutter_xcode.dylib 2>/dev/null || true
          
          # Compression en .ipa
          zip -r -q ../ipa/vipfit.ipa Payload
          echo "Fichier .ipa généré avec succès en esquivant Xcode !"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
