workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: flutter pub get

      - name: 2.5 Générer l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          else
            echo "Pas d'icône trouvée, étape ignorée."
          fi

      - name: 3. Désactiver totalement la signature iOS
        script: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          echo "Nettoyage complet du fichier Xcode..."

          # Supprimer toutes les lignes liées à la signature
          sed -i '' '/CODE_SIGN/d' "$PBXPROJ"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' '/ProvisioningStyle/d' "$PBXPROJ"
          sed -i '' '/PROVISIONING_PROFILE/d' "$PBXPROJ"

          # Forcer le mode manuel (sinon Xcode réactive la signature)
          echo "Forçage du ProvisioningStyle = Manual..."
          sed -i '' 's/TargetAttributes = {/TargetAttributes = {\n\t\t\t\tProvisioningStyle = Manual;/g' "$PBXPROJ"

          echo "Création du fichier xcconfig anti-signature..."
          mkdir -p ios/Flutter

          cat <<EOF > ios/Flutter/NoSign.xcconfig
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          EOF

          # Appliquer à toutes les configs
          echo '#include "NoSign.xcconfig"' >> ios/Flutter/Debug.xcconfig
          echo '#include "NoSign.xcconfig"' >> ios/Flutter/Release.xcconfig

      - name: 4. Compiler iOS sans signature
        script: |
          echo "Compilation iOS sans signature..."
          flutter build ios --release --no-codesign

      - name: 5. Générer le fichier .ipa
        script: |
          echo "Création du .ipa..."
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
