workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi

      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get

      - name: 2.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi

      - name: 2.8 Patcher la configuration Xcode (Contournement Signature)
        script: |
          echo "Désactivation des exigences de signature dans le projet Xcode..."
          PBXPROJ_PATH="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ_PATH" ]; then
            # Force la désactivation du code signing requis et supprime l'obligation d'une Team ID
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$PBXPROJ_PATH"
            sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "AUTOMATIC";/g' "$PBXPROJ_PATH"
            echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          else
            echo "Fichier pbxproj introuvable, tentative via xcconfig..."
            echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          fi

      - name: 3. Compiler la version iOS (Vrai appareil - Sans signature)
        script: |
          echo "Compilation de la version Release..."
          flutter build ios --release --no-codesign --build-name=1.0.0 --build-number=1

      - name: 4. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Empaquetage du Payload..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
