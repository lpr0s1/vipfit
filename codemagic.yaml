workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi
      - name: 1.5 Générer automatiquement l'icône de l'application
        script: |
          if [ -f "assets/app_icon.png" ]; then
            flutter pub get
            dart run flutter_launcher_icons
          fi
      - name: 2. Télécharger les dépendances
        script: |
          flutter pub get
      - name: 3. Compiler la version iOS (Forçage Sideloadly)
        script: |
          echo "Compilation sans signature et forçage des flags Xcode..."
          # On désactive la signature au niveau de Flutter ET on force Xcode à ignorer l'absence de Team ID
          flutter build ios --release --no-codesign --build-name=1.0.0 --build-number=1 --xcconfig-overrides=ios/Flutter/Release.xcconfig
      - name: 4. Créer le fichier .ipa
        script: |
          echo "Empaquetage du Payload pour Sideloadly..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q ../ipa/vipfit.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
