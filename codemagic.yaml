workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Nettoyage complet avant génération
        script: |
          echo "Suppression du dossier iOS pour repartir propre..."
          rm -rf ios
          flutter create . --project-name vipfit --org com.hx --platforms ios

      - name: 2. Dépendances
        script: flutter pub get

      - name: 3. Patch anti-signature AVANT build
        script: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          echo "Neutralisation totale de la signature..."

          # Supprimer toutes les lignes liées à la signature
          sed -i '' '/CODE_SIGN/d' "$PBXPROJ"
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          sed -i '' '/PROVISIONING_PROFILE/d' "$PBXPROJ"
          sed -i '' '/ProvisioningStyle/d' "$PBXPROJ"

          # Forcer le mode manuel
          sed -i '' 's/TargetAttributes = {/TargetAttributes = {\n\t\t\t\tProvisioningStyle = Manual;/g' "$PBXPROJ"

          # Ajouter un xcconfig global
          mkdir -p ios/Flutter
          cat <<EOF > ios/Flutter/NoSign.xcconfig
CODE_SIGNING_ALLOWED=NO
CODE_SIGNING_REQUIRED=NO
CODE_SIGN_IDENTITY=
DEVELOPMENT_TEAM=
PROVISIONING_PROFILE_SPECIFIER=
EOF

          echo '#include "NoSign.xcconfig"' >> ios/Flutter/Debug.xcconfig
          echo '#include "NoSign.xcconfig"' >> ios/Flutter/Release.xcconfig

      - name: 4. Build iOS sans signature
        script: |
          flutter build ios --release --no-codesign

      - name: 5. Création du .ipa
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa
