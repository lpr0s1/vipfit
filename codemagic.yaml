workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération des dossiers natifs iOS..."
          if [ ! -d "ios" ]; then
            flutter create . --project-name vipfit --org com.hx --platforms ios
          else
            echo "Dossier iOS déjà présent."
          fi
      - name: 2. Préparer les fichiers Flutter pour Xcode
        script: |
          flutter pub get
          # Cette commande pré-compile les assets et les fichiers de l'application sans lancer Xcode
          flutter build ios --config-only
      - name: 3. Forcer la compilation Xcode brute (Zéro Signature)
        script: |
          echo "Démarrage de la compilation directe via xcodebuild..."
          cd ios
          
          # Nettoyage des dossiers
          xcodebuild clean
          
          # Compilation brute en spécifiant de NE PAS SIGNER et de NE PAS CHERCHER d'équipe
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     DEVELOPMENT_TEAM="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build
      - name: 4. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Création du fichier .ipa final..."
          mkdir -p build/ios/ipa
          
          # On crée la structure du Payload demandée par Sideloadly
          mkdir -p build/ios/Payload
          
          # Copie du binaire compilé par Xcode vers le Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          
          # Compression au format .ipa
          cd build/ios
          zip -r -q ipa/vipfit.ipa Payload
          echo "L'IPA sans signature a été créé avec succès !"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
