workflows:
  ios-unsigned-ipa:
    name: vipfit
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: 1. Initialiser l'arborescence iOS
        script: |
          echo "Génération du projet iOS natif..."
          flutter create . --project-name vipfit --org com.hx --platforms ios

      - name: 2. Télécharger les dépendances et générer l'icône
        script: |
          flutter pub get
          if [ -f "assets/app_icon.png" ]; then
            dart run flutter_launcher_icons
          fi

      - name: 3. Préparer le projet Flutter pour Xcode
        script: |
          echo "Génération des fichiers de configuration Flutter..."
          # Cette commande prépare le terrain sans lancer la compilation stricte de Flutter
          flutter build ios --config-only --release

      - name: 4. Compilation forcée via Xcode (Contournement total)
        script: |
          echo "Lancement du build direct via xcodebuild sans signature..."
          cd ios
          
          # On compile le projet en direct en écrasant TOUTES les exigences d'Apple au niveau de la ligne de commande
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_METHOD=manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 5. Créer le fichier .ipa pour Sideloadly
        script: |
          echo "Création du package IPA..."
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q vipfit.ipa Payload
          mv vipfit.ipa ../ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - test@example.com
        notify:
          success: true
          failure: true
